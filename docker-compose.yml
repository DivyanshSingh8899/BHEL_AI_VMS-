version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: bhel_vms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bhel_user
      POSTGRES_PASSWORD: bhel_secure_password
      POSTGRES_DB: bhel_vms
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhel_user -d bhel_vms"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bhel_network

  redis:
    image: redis:7-alpine
    container_name: bhel_vms_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bhel_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bhel_vms_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      POSTGRES_SERVER: postgres
      REDIS_HOST: redis
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bhel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    container_name: bhel_vms_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - bhel_network

  nginx:
    image: nginx:1.25-alpine
    container_name: bhel_vms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./backend/uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - bhel_network

volumes:
  postgres_data:
    name: bhel_vms_postgres_data
  redis_data:
    name: bhel_vms_redis_data

networks:
  bhel_network:
    name: bhel_vms_network
    driver: bridge
